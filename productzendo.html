<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./productz.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
    <!---Header-->
    <section></section>

    <!--Product Detail---->
    <section class="product-detial">
        <div class="image-preview">
            <div class="small-image">
                <div class="box-image">
                    <img src="https://zandokh.com/image/catalog/products/2026-05/22226022461/STU_2415.jpg" alt="1">
                </div>
                <div class="box-image">
                    <img src="https://zandokh.com/image/catalog/products/2026-05/22226022461/STU_2420.jpg" alt="2">
                </div>
                <div class="box-image">
                      <img src="https://zandokh.com/image/catalog/products/2026-05/22226022461/STU_2410.jpg" alt="3">
                </div>
                <div class="box-image">
                      <img src="https://zandokh.com/image/catalog/products/2026-05/22226022461/STU_2409.jpg" alt="4">
                </div>
                <div class="box-image">
                       <img src="https://zandokh.com/image/catalog/products/2026-05/22226022461/STU_2408.jpg" alt="5">
                </div>
            </div>
            <div class="big-image">
                <img src="https://zandokh.com/image/catalog/products/2026-05/22226022461/STU_2415.jpg" alt="6">
            </div>
        </div>

        <div class="des">
            <div class="item-price">
                <p> Price: US $9.59 </p>
                <p> Cropped Top</p>
            </div>
            <div class="item-color">
                <p>1 Colors available</p>
                <div class="img-color">
                    <div class="color-title">
                         <p>red</p>
                    </div>
                     <img src="https://zandokh.com/image/catalog/products/2026-05/22226022461/STU_2415.jpg" alt="">
                </div>

                <div class="item-size">
                    <p>Size</p>
                    <div class="box-size">
                        <div class="size">XS</div>
                        <div class="size">S</div>
                        <div class="size">M</div>
                        <div class="size">L</div>
                        <div class="size">XL</div>
                    </div>
                </div>

                <div class="item-size1">
                    <p>Quantity</p>
                    <div class="box-size">
                        <div class="size">-</div>
                        <div class="size">1</div>
                        <div class="size">+</div>
                    </div>
                </div>
                <div class="btn-card">
                    <p>Add to bug</p>
                    <div class="pic">
                      <i class="fa-solid fa-heart-circle-plus"></i>
                    </div>
                   <div class="box1">
                    <div class="sm-b1">
                         <i class="fa-solid fa-business-time"></i>
                         <p>Fast Delivery</p>
                         <p>From 1 - 3 days</p>
                    </div>
                    <div class="sm-b2">
                        <i class="fa-brands fa-cc-amazon-pay"></i>
                        <p>Easy payment</p>
                        <p>Many forms</p>
                    </div>
                    <div class="sm-b3">
                        <i class="fa-solid fa-phone"></i>
                        <p>Support hotline</p>
                        <p>(+855) 085 330 330</p>
                    </div>
                   </div>
                   <div class="box2">
                    <p>Model info</p>
                    </div>
                    <div class="box3">
                        <p>Size guide</p>
                    </div>
                    <div class="box4">
                        <p>Online exchange policy</p>
                        <hr>
                    </div>
                </div>
            </div>
        </div>
    </section>
</body>
</html>
